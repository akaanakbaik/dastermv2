name: Test

on:
  push:
    branches:
      - main
      - master
    paths:
      - "install.sh"
      - "bin/**"
      - "lib/**"
      - "scripts/**"
      - "worker/**"
      - ".github/workflows/**"
      - "Makefile"
      - "VERSION"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "install.sh"
      - "bin/**"
      - "lib/**"
      - "scripts/**"
      - "worker/**"
      - ".github/workflows/**"
      - "Makefile"
      - "VERSION"
  workflow_dispatch:

concurrency:
  group: dasterm-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bash:
    name: Bash Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f install.sh
          test -f bin/dasterm
          test -d lib
          test -f VERSION

      - name: Check Bash syntax
        run: |
          bash -n install.sh
          bash -n bin/dasterm
          find lib -type f -name "*.sh" -print0 | xargs -0 -I{} bash -n {}
          if [ -d scripts ]; then
            find scripts -type f -name "*.sh" -print0 | xargs -0 -r -I{} bash -n {}
          fi

      - name: Run minimal bootstrap test
        run: |
          chmod +x bin/dasterm
          mkdir -p "$HOME/.config/dasterm" "$HOME/.cache/dasterm" "$HOME/.local/share/dasterm/logs"
          cat > "$HOME/.config/dasterm/config.env" <<'EOF'
          DASTERM_VERSION="2.0.0"
          DASTERM_LANG="en"
          DASTERM_MODE="lite"
          DASTERM_THEME="mono"
          DASTERM_USERHOST="ci@github"
          DASTERM_SHOW="manual"
          DASTERM_PROMPT="off"
          DASTERM_SLASH="off"
          DASTERM_TELEMETRY="off"
          DASTERM_REPO_OWNER="akaanakbaik"
          DASTERM_REPO_NAME="dastermv2"
          DASTERM_REPO_BRANCH="main"
          EOF
          sudo mkdir -p /usr/local/share/dasterm/lib
          sudo cp lib/*.sh /usr/local/share/dasterm/lib/
          sudo install -m 755 bin/dasterm /usr/local/bin/dasterm
          dasterm version
          dasterm help
          dasterm doctor

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck errors only
        run: |
          shellcheck -x -s bash --severity=error install.sh bin/dasterm lib/*.sh
          if [ -d scripts ]; then
            find scripts -type f -name "*.sh" -print0 | xargs -0 -r shellcheck -x -s bash --severity=error
          fi